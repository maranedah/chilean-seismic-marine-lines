repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-json
        exclude: ^data/extracted_jsons/
      - id: check-added-large-files
        args: ['--maxkb=500']

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.5.0
    hooks:
      - id: ruff
        args: [--fix]
        files: ^backend/

  - repo: local
    hooks:
      - id: frontend-lint
        name: Frontend ESLint
        language: system
        entry: python src/tools/frontend_lint.py
        files: \.(tsx?|jsx?)$
        pass_filenames: false

      - id: frontend-typecheck
        name: Frontend TypeScript Check
        language: system
        entry: python src/tools/frontend_typecheck.py
        files: \.(tsx?|ts?)$
        pass_filenames: false
