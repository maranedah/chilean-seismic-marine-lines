services:
  backend:
    build:
      context: ./backend
    ports:
      - "8000:8000"
    volumes:
      - ./data/extracted_jsons:/app/data/extracted_jsons:ro
      - ./data/extracted_images:/app/data/extracted_images:ro
      - ./${GCP_SA_KEY}:/run/secrets/sa-key.json:ro
    environment:
      - PAPERS_DIR=/app/data/extracted_jsons
      - IMAGES_DIR=/app/data/extracted_images
      - GCS_BUCKET=${GCS_BUCKET}
      - GOOGLE_APPLICATION_CREDENTIALS=/run/secrets/sa-key.json
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 5

  frontend:
    build:
      context: ./frontend
      target: dev
    ports:
      - "3000:3000"
    environment:
      - BACKEND_URL=http://backend:8000
    depends_on:
      backend:
        condition: service_healthy
    volumes:
      - ./frontend/src:/app/src
